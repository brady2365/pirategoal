<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FutGoal</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#0b0f17;
    color:white;
}

/* Navbar */

nav{
    width:100%;
    height:70px;
    background:#111827;
    display:flex;
    align-items:center;
    padding:0 40px;
    box-shadow:0 5px 20px rgba(0,0,0,.5);
}

.logo{
    font-size:30px;
    font-weight:bold;
}

.logo span{
    color:#00e676;
}

.right{
    display:flex;
    gap:15px;
}

button{
    background:#00e676;
    color:black;
    border:none;
    padding:10px 18px;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
    transition:.3s;
}

button:hover{
    transform:translateY(-2px);
    box-shadow:0 0 15px #00e676;
}

.container{
    max-width:1400px;
    margin:auto;
    padding:30px;
}

.player{
    position:relative;
    border-radius:18px;
    overflow:hidden;
    background:#111827;
    border:2px solid #00e676;
    box-shadow:0 0 30px rgba(0,230,118,.3);
}

.player iframe{
    width:100%;
    height:75vh;
    border:none;
}

/* Floating button */

.fullscreen{
    position:absolute;
    top:15px;
    right:15px;
    z-index:100;
}

.info{
    margin-top:20px;
    color:#9ca3af;
    line-height:1.6;
}
</style>

</head>
<body>

<nav>

<div class="logo">
⚽ Fut<span>Goal</span>
</div>

</nav>

<div class="container">

<div class="player" id="player">

<button class="fullscreen" onclick="toggleFullscreen()">
⛶
</button>

<iframe
allowfullscreen
class="cf"
frameborder="0"
name="search_iframe"
sandbox="allow-forms allow-same-origin allow-scripts"
scrolling="no"
src="https://w4.sportsonlline.click/channels/hd/hd1.php">
</iframe>

</div>

<div class="info">
<h2>Live Football</h2>
<p>
Watch live football streams in high quality. If the stream buffers,
refresh the page or try another source.
</p>

</div>

</div>

<script>

const player = document.getElementById("player");

function toggleFullscreen() {
    if (!document.fullscreenElement) {
        player.requestFullscreen();
    } else {
        document.exitFullscreen();
    }
}

// Center the iframe when entering fullscreen
document.addEventListener("fullscreenchange", () => {
    if (document.fullscreenElement) {
        player.style.display = "flex";
        player.style.alignItems = "center";
        player.style.justifyContent = "center";
        player.style.background = "#000";

        const iframe = player.querySelector("iframe");
        iframe.style.width = "100%";
        iframe.style.height = "100vh";
        iframe.style.maxHeight = "100vh";
    } else {
        player.style.display = "block";

        const iframe = player.querySelector("iframe");
        iframe.style.height = "75vh";
    }
});

</script>

</body>
</html>
